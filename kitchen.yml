driver:
  name: vagrant

transport:
  name: winrm
  elevated: true

provisioner:
  name: policyfile_zero
  deprecations_as_errors: true
  policyfile: Policyfile.rb

verifier:
  name: inspec

platforms:
  - name: windows-2019
    driver_config:
      box: gusztavvargadr/windows-server-2019-standard
      customize:
        memory: 3072
  - name: windows-2022
    driver_config:
      box: gusztavvargadr/windows-server-2022-standard
      customize:
        memory: 3072

suites:
  - name: all
    provisioner:
      named_run_list: all
    verifier:
      inspec_tests:
        - test/integration/default
  - name: vc6
    provisioner:
      named_run_list: vc6
    verifier:
      inspec_tests:
        - test/integration/vc6
  - name: vc9
    provisioner:
      named_run_list: vc9
    verifier:
      inspec_tests:
        - test/integration/vc9
  - name: vc10
    provisioner:
      named_run_list: vc10
    verifier:
      inspec_tests:
        - test/integration/vc10
  - name: vc11
    provisioner:
      named_run_list: vc11
    verifier:
      inspec_tests:
        - test/integration/vc11
  - name: vc12
    provisioner:
      named_run_list: vc12
    verifier:
      inspec_tests:
        - test/integration/vc12
  - name: vc14
    provisioner:
      named_run_list: vc14
    verifier:
      inspec_tests:
        - test/integration/vc14
